name: Ubuntu 22.04 Build

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-22.04
        strategy:
            fail-fast: false
            matrix:
                build_type: [ Release, Debug ]

        steps:
            -   name: Checkout
                uses: actions/checkout@v4

            -   name: Install build tools
                run: |
                    sudo apt-get update
                    sudo apt-get install -y build-essential cmake ninja-build

            -   name: Configure
                run: cmake -S . -B build -GNinja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

            -   name: Build
                run: cmake --build build --parallel

            -   name: Verify binaries
                run: |
                    test -x build/tod_forwarder
                    test -x build/test_serial_loopback
